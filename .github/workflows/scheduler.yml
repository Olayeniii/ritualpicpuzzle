name: Scheduler

on:
  schedule:
    # Production: once a day at 00:00 UTC
    # - cron: "0 0 * * *"
    
    # Testing: every 15 minutes
    - cron: "*/15 * * * *"

  workflow_dispatch:  # lets you run it manually from GitHub UI

jobs:
  call-vercel-endpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Run daily cron directly
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/run-cron.mjs
