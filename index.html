  <style>
    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(ellipse at bottom, #0a0a1f 0%, #060012 100%);
  color: #e0e0ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
}

#puzzle {
  width: 300px;
  height: 300px;
  display: grid;
  grid-template: repeat(3, 1fr) / repeat(3, 1fr);
  gap: 2px;
  margin-bottom: 10px;
  border: 2px solid #ff2f92;
  box-shadow: 0 0 20px #ff2f92, 0 0 12px #2f00ff inset;
  background: #100018;
}

.tile {
  width: 100px;
  height: 100px;
  background-size: 300px 300px;
  cursor: pointer;
  border-radius: 8px;
  box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.15);
  transition: transform 0.2s ease, box-shadow 0.3s;
}

.tile:hover {
  box-shadow: 0 0 12px #ff69b4, 0 0 8px #8a2be2;
  transform: scale(1.02);
}

button {
  margin: 6px;
  padding: 10px 18px;
  background: linear-gradient(135deg, #7f00ff, #e100ff);
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 10px #c800ff;
  transition: background 0.3s, box-shadow 0.3s;
}

button:hover {
  background: linear-gradient(135deg, #9900ff, #ff00cc);
  box-shadow: 0 0 15px #ff00cc;
}

#logo {
  max-width: 120px;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 8px #ff00cc);
}

h1 {
  color: #ff2f92;
  text-shadow: 0 0 12px #7f00ff, 0 0 8px #e100ff;
  letter-spacing: 1px;
}

#status {
  font-weight: bold;
  font-size: 1.3em;
  color: #00ffd0;
  margin: 10px 0;
  text-shadow: 0 0 6px #00ffcc;
}

#moves, #timer {
  font-weight: bold;
  color: #ffe45e;
  text-shadow: 0 0 6px #ffd700;
}
  </style>
</head>

  <h1>Ritual Puzzle Game</h1>
  <div id="puzzle"></div>
  <div>
    <button onclick="shuffleAndDraw()">Shuffle</button>
    <button onclick="resetTiles()">Reset</button>
    <button onclick="showInstructions()">Instructions</button>
  </div>
  <p id="status"></p>
  <p>Moves: <span id="moves">0</span></p>
  <p>Time: <span id="timer">0</span> seconds</p>
  <audio id="move-sound" src="https://www.soundjay.com/button/sounds/button-29.mp3" preload="auto"></audio>
  <script>
    const imgUrl = "ritual.jpg";
    const puzzle = document.getElementById("puzzle");
    const status = document.getElementById("status");
    const moveSound = document.getElementById("move-sound");
    const moveCounter = document.getElementById("moves");
    const timerDisplay = document.getElementById("timer");

    let originalTiles = Array.from({ length: 9 }, (_, i) => i);
    let tiles = [...originalTiles];
    let moves = 0;
    let timer = 0;
    let timerInterval;

    function draw() {
      puzzle.innerHTML = "";
      tiles.forEach((tile, i) => {
        const el = document.createElement("div");
        if (tile === 8) {
          el.className = "tile";
          el.style.background = "transparent";
        } else {
          el.className = "tile";
          el.style.backgroundImage = `url(${imgUrl})`;
          el.style.backgroundPosition = `-${(tile % 3) * 100}px -${Math.floor(tile / 3) * 100}px`;
          el.addEventListener("click", () => tryMove(i));
        }
        puzzle.appendChild(el);
      });
    }

    function tryMove(index) {
      const emptyIndex = tiles.indexOf(8);
      if (isValidMove(index, emptyIndex)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        moveSound.play();
        moves++;
        moveCounter.textContent = moves;
        draw();
        checkWin();
      }
    }

    function isValidMove(from, to) {
      const dx = Math.abs((from % 3) - (to % 3));
      const dy = Math.abs(Math.floor(from / 3) - Math.floor(to / 3));
      return dx + dy === 1;
    }

    function checkWin() {
      if (tiles.slice(0, 8).every((t, i) => t === i)) {
        status.textContent = "🎉 You solved it!";
        clearInterval(timerInterval);
        showConfetti();
      } else {
        status.textContent = "";
      }
    }

    function showConfetti() {
      const confetti = document.createElement("div");
      confetti.textContent = "✨";
      confetti.style.position = "fixed";
      confetti.style.top = "50%";
      confetti.style.left = "50%";
      confetti.style.transform = "translate(-50%, -50%)";
      confetti.style.fontSize = "5rem";
      confetti.style.animation = "fade 2s forwards";
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function shuffleAndDraw() {
      shuffle(tiles);
      draw();
      status.textContent = "";
      moves = 0;
      moveCounter.textContent = moves;
      timer = 0;
      timerDisplay.textContent = timer;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer++;
        timerDisplay.textContent = timer;
      }, 1000);
    }

    function resetTiles() {
      tiles = [...originalTiles];
      draw();
      moves = 0;
      moveCounter.textContent = moves;
      timer = 0;
      timerDisplay.textContent = timer;
      clearInterval(timerInterval);
    }

    function showInstructions() {
      alert("Click a tile next to the blank to slide it into place. Arrange them in the correct order to win.");
    }

    shuffleAndDraw();
  </script>
